<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Model Reports — June 2026 (Archived)</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-elev: #121a30;
      --bg-card: #151f3a;
      --border: #25305a;
      --text: #e7ecf7;
      --text-muted: #9aa6c4;
      --accent: #6ea8ff;
      --accent-hover: #8fbcff;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(110, 168, 255, 0.15), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(180, 120, 255, 0.12), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }

    header {
      margin-bottom: 48px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(110, 168, 255, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.02em;
      margin: 0 0 14px;
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff 0%, #a9c4ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 640px;
      margin: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 40px 0 24px;
      flex-wrap: wrap;
    }

    .count {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }

    .count strong {
      color: var(--text);
      font-weight: 600;
    }

    .search {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .search input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search input::placeholder { color: var(--text-muted); }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110, 168, 255, 0.18);
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      padding: 22px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease,
        box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: var(--shadow);
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      background: #1a2547;
      box-shadow: 0 10px 32px rgba(110, 168, 255, 0.2);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .index-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #0b1020;
      background: linear-gradient(135deg, #6ea8ff, #b478ff);
      padding: 4px 9px;
      border-radius: 6px;
      font-variant-numeric: tabular-nums;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      word-break: break-all;
    }

    .arrow {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      transition: gap 0.18s ease, color 0.18s ease;
    }

    .card:hover .arrow {
      gap: 10px;
      color: var(--accent-hover);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 15px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: var(--bg-elev);
    }

    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 560px) {
      .container { padding: 40px 18px 64px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search { max-width: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="eyebrow">Archived · June 2026</span>
      <h1>AI Model Reports</h1>
      <p class="subtitle">
        A curated archive of model evaluation reports generated throughout
        June 2026. Click any card to open the full report.
      </p>
    </header>

    <div class="toolbar">
      <span class="count"><strong id="visible">0</strong> of <span id="total">0</span> reports</span>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="filter" type="search" placeholder="Filter reports..." aria-label="Filter reports" />
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="empty" id="empty" style="display:none;">
      No reports match your filter.
    </div>

    <footer>
      Archived reports &middot; static index generated for local navigation
    </footer>
  </div>

  <script>
    (function () {
      var reports = [
        { file: "ai_model_report_june_2026_01.html",                title: "Report 01",               tag: "01" },
        { file: "ai_model_report_june_2026_02_GLM-5.2-Max.html",   title: "GLM-5.2 Max",             tag: "02" },
        { file: "ai_model_report_june_2026_03_Kimi-K2.7.html",     title: "Kimi K2.7",               tag: "03" },
        { file: "ai_model_report_june_2026_04_Qwen3.7-Max.html",    title: "Qwen3.7 Max",             tag: "04" },
        { file: "ai_model_report_june_2026_05_GLM-5.2-High.html",  title: "GLM-5.2 High",            tag: "05" },
        { file: "ai_model_report_june_2026_06_MiMo-V2.5-Pro.html", title: "MiMo V2.5 Pro",          tag: "06" },
        { file: "ai_model_report_june_2026_07_MiniMax-M3.html",    title: "MiniMax M3",              tag: "07" },
        { file: "ai_model_report_june_2026_08_Qwen3.7-Plus.html",  title: "Qwen3.7 Plus",            tag: "08" },
        { file: "ai_model_report_june_2026_09_Hy3.html",           title: "Hy3",                     tag: "09" },
        { file: "ai_model_report_june_2026_10_DeepSeek-V4-Pro.html", title: "DeepSeek V4 Pro",       tag: "10" },
        { file: "ai_model_report_june_2026_11_Sonnet-4.6-High.html", title: "Sonnet 4.6 High",       tag: "11" },
        { file: "ai_model_report_june_2026_12_Kimi-K2.6.html",     title: "Kimi K2.6",                tag: "12" },
        { file: "ai_model_report_june_2026_13_GLM-5.1-High.html",  title: "GLM-5.1 High",            tag: "13" },
        { file: "ai_model_report_june_2026_14_Sonnet-5-Extra.html", title: "Sonnet 5 Extra",         tag: "14" },
        { file: "ai_model_report_june_2026_15.html",               title: "Report 15",              tag: "15" },
        { file: "ai_model_report_june_2026_16_mistral-large-3.html", title: "Mistral Large 3",      tag: "16" }
      ];

      var grid = document.getElementById("grid");
      var empty = document.getElementById("empty");
      var visible = document.getElementById("visible");
      var total = document.getElementById("total");
      var filter = document.getElementById("filter");

      total.textContent = reports.length;

      function friendlyName(file) {
        // strip extension + leading date prefix for a cleaner meta line
        return file.replace(/\.html$/, "");
      }

      function render(query) {
        var q = (query || "").trim().toLowerCase();
        var filtered = q
          ? reports.filter(function (r) {
              return (r.title + " " + r.file).toLowerCase().indexOf(q) !== -1;
            })
          : reports;

        grid.innerHTML = "";
        visible.textContent = filtered.length;

        if (filtered.length === 0) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        filtered.forEach(function (r) {
          var a = document.createElement("a");
          a.className = "card";
          a.href = encodeURIComponent(r.file);

          a.innerHTML =
            '<div class="card-top">' +
              '<span class="index-badge">#' + r.tag + "</span>" +
            "</div>" +
            '<h2 class="card-title">' + r.title + "</h2>" +
            '<p class="card-meta">' + friendlyName(r.file) + "</p>" +
            '<span class="arrow">Open report' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" ' +
              'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
              'stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line>' +
              '<polyline points="12 5 19 12 12 19"></polyline></svg>' +
            "</span>";

          grid.appendChild(a);
        });
      }

      filter.addEventListener("input", function () {
        render(filter.value);
      });

      render("");
    })();
  </script>
</body>
</html>
