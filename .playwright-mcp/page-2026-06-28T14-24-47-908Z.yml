    - generic [ref=e22]: 00 — Premise
    - generic [ref=e23]:
      - paragraph [ref=e24]: "This stack exists to answer one question: can a roster of open-weight Chinese models replace Claude Opus and Sonnet across twelve distinct coding-agent roles — and at what cost, with what caveats?"
      - paragraph [ref=e25]:
        - text: Two rosters are maintained.
        - strong [ref=e26]: Table 1 (Expanded)
        - text: keeps three independently-strong models in every fallback column — maximum resilience for autonomous long-horizon runs.
        - strong [ref=e27]: Table 2 (Lean)
        - text: collapses to the models that actually fire in practice, trimming carry-weight and token spend where a third fallback was never invoked.
      - paragraph [ref=e28]:
        - text: Every benchmark figure below is either
        - strong [ref=e29]: independently reproduced
        - text: on standard suites or marked with a glyph (* vendor-reported, † independently run by Kilo, ‡ vendor-reported pending reproduction). The ledger is the source of truth; the rosters are its interpretation.
